openapi: 3.0.3
info:
  title: Tasks API
  version: 1.0.0
  description: API for the Tasks (ToDo) application used by the Blazor frontend.
servers:
  - url: http://localhost:5000
    description: Local development server
tags:
  - name: tasks
    description: |
      タスク管理（一覧・作成・取得・更新・削除・完了/未完了切替）
      UI 仕様と実装ノートは docs/ 以下の仕様書を参照してください（docs/tasks-page.md, docs/tasks-show.md, docs/task-add.md, docs/task-update.md）。
      サーバ側ではページング、フィルタ、バリデーション、作成時の createdAt 設定、更新時の updatedAt 更新などのルールを遵守してください。

paths:
  /tasks:
    get:
      tags: [tasks]
      summary: List tasks with pagination and optional filters
      operationId: listTasks
      description: |
        フロント（docs/tasks-show.md）向け表示ロジック。
        実装手順:
          1. クエリ q（title, content の全文検索）、tag（カンマ区切り）、completed（真偽）、sort、page、pageSize を受け取る。
          2. DB でフィルタ・全文検索・ソートを適用し、該当アイテムを取得する（Postgres の全文検索利用が推奨）。
          3. 合計件数 total を取得して TaskList { items, total, page, pageSize } を返す。
          4. UI 要件として「全項目を1画面に表示（スクロール不可）」という記述があるため、pageSize の調整やフロント側での表示制御を想定する。
        注意:
          - 大量データ時は pageSize 制限、インデックス、検索分割を検討する。
      parameters:
        - name: q
          in: query
          description: Full-text search over title and content
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag (comma-separated)
          schema:
            type: string
        - name: completed
          in: query
          description: Filter by completion status
          schema:
            type: boolean
        - name: sort
          in: query
          description: Sort field (e.g. dueDate or createdAt). Prefix with '-' for descending.
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Items per page
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: A paginated list of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskList'

    post:
      tags: [tasks]
      summary: Create a new task
      operationId: createTask
      description: |
        フロント（docs/task-add.md）からの新規作成処理。
        実装手順:
          1. リクエスト body (TaskCreate) をバリデーション（title 必須）する。
          2. id を GUID 生成、createdAt を現在時刻に設定、completed を既定値 false に設定する。
          3. DB に挿入し、201 を返す。可能なら Location ヘッダに /tasks/{id} を設定する。
          4. 入力不正時は 400 を返す。
      requestBody:
        description: 新規作成するタスクのペイロード
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{taskId}:
    parameters:
      - name: taskId
        in: path
        description: タスクID（UUID）
        required: true
        schema:
          type: string
    get:
      tags: [tasks]
      summary: Get a single task by ID
      operationId: getTask
      description: |
        実装手順:
          1. path の taskId（UUID）で DB を検索し、存在すれば Task を返す。
          2. 存在しない場合は 404 を返す（#/components/responses/NotFound を利用）。
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [tasks]
      summary: Replace a task
      operationId: replaceTask
      description: |
        実装手順:
          1. 指定 taskId のタスクを全件置換する（全体更新）。
          2. createdAt は保持し、updatedAt を現在時刻に更新する。
          3. バリデーション失敗は 400、タスク未発見は 404 を返す。
      requestBody:
        description: タスクの全体置換ペイロード（title 必須）
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '200':
          description: Task replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [tasks]
      summary: Update one or more fields on a task
      operationId: updateTask
      description: |
        フロント（docs/task-update.md）の要件に合わせた部分更新。
        実装手順:
          1. 提供されたフィールドのみ更新し、updatedAt を現在時刻に更新する（部分更新）。
          2. contenteditable によるインライン編集を想定し、頻繁な小さな更新に耐えられるようにする。
          3. 存在しない場合は 404 を返す。
      requestBody:
        description: 部分更新するフィールドを含むペイロード
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [tasks]
      summary: Delete a task
      operationId: deleteTask
      description: |
        実装手順:
          1. 指定 taskId を削除する。成功時は 204 を返す。
          2. タスク未発見なら 404 を返す。
      responses:
        '204':
          description: Task deleted (no content)
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{taskId}/complete:
    post:
      tags: [tasks]
      summary: Mark a task as completed
      operationId: completeTask
      description: |
        実装手順:
          1. 指定 taskId の Completed を true に設定し、updatedAt を更新する。
          2. 更新後の Task を返す。未発見は 404 を返す。
      parameters:
        - name: taskId
          in: path
          description: タスクID（UUID）
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{taskId}/uncomplete:
    post:
      tags: [tasks]
      summary: Mark a task as not completed
      operationId: uncompleteTask
      description: |
        実装手順:
          1. 指定 taskId の Completed を false に設定し、updatedAt を更新する。
          2. 更新後の Task を返す。未発見は 404 を返す。
      parameters:
        - name: taskId
          in: path
          description: タスクID（UUID）
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    Task:
      type: object
      description: タスク情報（取得・更新・削除対象）
      required: [id, title, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: タスクID（UUID）
        title:
          type: string
          description: タスクタイトル
        content:
          type: string
          nullable: true
          description: タスクの詳細（任意）
        dueDate:
          type: string
          format: date-time
          nullable: true
          description: 期日（ISO 8601）
        completed:
          type: boolean
          default: false
          description: 完了フラグ（true=完了）
        tags:
          type: array
          description: タグ一覧
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          description: 作成日時（ISO 8601）
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: 更新日時（ISO 8601、未更新時は null）

    TaskCreate:
      type: object
      description: タスク作成・全体置換リクエスト（title 必須、それ以外は任意）
      required: [title]
      properties:
        title:
          type: string
          description: タイトル（必須）
        content:
          type: string
          description: タスクの詳細
        dueDate:
          type: string
          format: date-time
          description: 期日（ISO 8601）
        tags:
          type: array
          description: タグ一覧
          items:
            type: string

    TaskUpdate:
      type: object
      description: タスク部分更新リクエスト（全フィールド任意、指定されたフィールドのみ更新される）
      properties:
        title:
          type: string
          description: タイトル
        content:
          type: string
          description: タスクの詳細
        dueDate:
          type: string
          format: date-time
          description: 期日（ISO 8601）
        completed:
          type: boolean
          description: 完了フラグ（true=完了）
        tags:
          type: array
          description: タグ一覧
          items:
            type: string

    TaskList:
      type: object
      description: ページネーション対応のタスク一覧レスポンス
      properties:
        items:
          type: array
          description: タスク配列
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
          description: 合計件数
        page:
          type: integer
          description: 現在ページ番号（1-based）
        pageSize:
          type: integer
          description: 1ページあたりの件数

    Error:
      type: object
      description: エラーレスポンス（code と message を含む）
      properties:
        code:
          type: integer
          description: エラーコード
        message:
          type: string
          description: エラーメッセージ

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
